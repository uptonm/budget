name: Build
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Dependencies
        run: bun install --frozen-lockfile
        env:
          SKIP_ENV_VALIDATION: true

      - name: Run Build
        run: bun run build
        env:
          SKIP_ENV_VALIDATION: true
